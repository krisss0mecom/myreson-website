<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyReson AI — Logo v4</title>
    <style>
        body { background: #08080c; color: #f1f5f9; font-family: system-ui, sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; max-width: 1000px; margin: 30px auto; }
        .c { background: #0e0e14; border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 30px; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; }
        h1 { text-align: center; font-size: 20px; margin-bottom: 4px; }
        .sub { text-align: center; color: #444; font-size: 12px; margin-bottom: 10px; }
        .row { display: flex; gap: 40px; justify-content: center; align-items: center; margin: 40px auto; flex-wrap: wrap; }
        .wm { display: flex; align-items: center; gap: 14px; }
        .wm span { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; color: #f1f5f9; }
        .dark { background: #0e0e14; border-radius: 16px; padding: 24px 36px; }
        .light { background: #f0f0f0; border-radius: 16px; padding: 24px 36px; }
        .light span { color: #111; }
    </style>
</head>
<body>

<h1>MyReson AI — Brain + Waves</h1>
<p class="sub">brain contour with phase oscillations inside</p>

<div class="grid">

    <!-- 1: Clean brain outline + single sine wave -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Brain outline - simplified -->
            <path d="M 60 12 Q 85 8 98 22 Q 112 38 105 55 Q 100 68 88 75 Q 78 82 65 85 L 55 85 Q 42 82 32 75 Q 20 68 15 55 Q 8 38 22 22 Q 35 8 60 12 Z" stroke="url(#b1)" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <!-- Central fissure -->
            <path d="M 60 12 Q 58 30 60 50 Q 62 70 60 85" stroke="url(#b1)" stroke-width="1.5" fill="none" opacity="0.3"/>
            <!-- Phase wave inside -->
            <path d="M 25 48 Q 38 28 50 48 Q 62 68 75 48 Q 88 28 98 48" stroke="#10b981" stroke-width="3" stroke-linecap="round" fill="none"/>
            <defs>
                <linearGradient id="b1" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 2: Brain + double wave (theta + gamma) -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <path d="M 60 12 Q 85 8 98 22 Q 112 38 105 55 Q 100 68 88 75 Q 78 82 65 85 L 55 85 Q 42 82 32 75 Q 20 68 15 55 Q 8 38 22 22 Q 35 8 60 12 Z" stroke="url(#b2)" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <!-- Slow wave (theta/S1) -->
            <path d="M 22 45 Q 40 30 60 45 Q 80 60 100 45" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Fast wave (gamma/S2) -->
            <path d="M 22 55 Q 32 45 40 55 Q 48 65 56 55 Q 64 45 72 55 Q 80 65 88 55 Q 96 45 100 55" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <defs>
                <linearGradient id="b2" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 3: Brain + triple wave (S1 slow + S2 fast + CNOT coupling) -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <path d="M 60 12 Q 85 8 98 22 Q 112 38 105 55 Q 100 68 88 75 Q 78 82 65 85 L 55 85 Q 42 82 32 75 Q 20 68 15 55 Q 8 38 22 22 Q 35 8 60 12 Z" stroke="url(#b3)" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <!-- S1 slow wave (top) -->
            <path d="M 25 38 Q 45 26 60 38 Q 75 50 98 38" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- CNOT coupling (middle) -->
            <path d="M 25 50 Q 45 42 60 50 Q 75 58 98 50" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- S2 fast wave (bottom) -->
            <path d="M 25 62 Q 33 55 40 62 Q 47 69 55 62 Q 63 55 70 62 Q 77 69 85 62 Q 92 55 98 62" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <defs>
                <linearGradient id="b3" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 4: More detailed brain with lobes + wave -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Brain with more detail -->
            <path d="M 55 14 Q 72 10 85 14 Q 100 20 105 35 Q 108 48 102 58 Q 96 68 88 74 Q 78 82 65 85 Q 58 86 55 85" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 55 14 Q 38 10 25 18 Q 14 28 14 42 Q 14 56 22 66 Q 30 76 42 82 Q 50 86 55 85" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <!-- Cerebellum bump -->
            <path d="M 88 74 Q 95 78 92 84 Q 88 90 80 85" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Brain stem -->
            <path d="M 55 85 Q 52 92 50 95" stroke="url(#b4)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <!-- Folds hint -->
            <path d="M 35 30 Q 45 25 55 30" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
            <path d="M 65 28 Q 80 22 90 30" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
            <!-- Phase waves inside -->
            <path d="M 22 50 Q 35 35 50 50 Q 65 65 80 50 Q 92 38 100 50" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <defs>
                <linearGradient id="b4" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 5: Geometric brain (hexagonal) + waves -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Geometric/angular brain shape -->
            <path d="M 55 12 L 80 12 L 100 25 L 108 45 L 100 65 L 85 78 L 65 85 L 55 85 L 35 78 L 20 65 L 12 45 L 20 25 L 40 12 Z" stroke="url(#b5)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
            <!-- Inner structure lines -->
            <line x1="55" y1="12" x2="55" y2="85" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <!-- Phase waves -->
            <path d="M 20 42 Q 35 28 50 42 Q 65 56 80 42 Q 95 28 108 42" stroke="#10b981" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M 20 55 Q 35 65 50 55 Q 65 45 80 55 Q 95 65 108 55" stroke="#6366f1" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
            <defs>
                <linearGradient id="b5" x1="10" y1="10" x2="110" y2="90"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 6: Minimal brain silhouette + resonance wave -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Ultra-clean brain profile -->
            <path d="M 58 15 Q 82 10 96 24 Q 110 40 104 58 Q 98 72 85 80 Q 72 88 58 88 Q 44 88 32 80 Q 18 72 14 58 Q 8 40 22 24 Q 36 10 58 15 Z" stroke="url(#b6)" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
            <!-- Single elegant wave -->
            <path d="M 25 50 C 38 25 52 75 65 50 C 78 25 92 50 100 50" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <defs>
                <linearGradient id="b6" x1="8" y1="15" x2="110" y2="88"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 7: Side profile brain + crossing waves -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Brain side profile -->
            <path d="M 50 88 Q 30 85 20 72 Q 10 58 12 42 Q 14 26 28 16 Q 42 8 58 10 Q 74 12 86 18 Q 100 26 106 42 Q 110 55 104 65 Q 98 75 88 78 Q 82 80 78 84 Q 74 88 68 90 Q 58 92 50 88 Z" stroke="url(#b7)" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <!-- Two crossing phase waves -->
            <path d="M 20 48 Q 40 30 60 48 Q 80 66 100 48" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M 20 55 Q 40 73 60 55 Q 80 37 100 55" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Coupling point -->
            <circle cx="60" cy="51" r="4" fill="#06b6d4"/>
            <defs>
                <linearGradient id="b7" x1="10" y1="10" x2="110" y2="90"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient>
            </defs>
        </svg>
    </div>

    <!-- 8: Abstract brain from waves only (no outline) -->
    <div class="c">
        <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
            <!-- Brain shape MADE of waves -->
            <!-- Top curve (cortex) -->
            <path d="M 25 45 Q 30 15 55 12 Q 80 10 95 20 Q 108 30 100 48" stroke="#6366f1" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- Bottom curve (temporal) -->
            <path d="M 25 45 Q 18 60 25 72 Q 35 85 55 88 Q 72 88 82 82 Q 95 72 100 48" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- Internal wave 1 -->
            <path d="M 30 42 Q 45 28 60 42 Q 75 56 92 42" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Internal wave 2 -->
            <path d="M 30 58 Q 45 68 60 58 Q 75 48 92 58" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
        </svg>
    </div>

</div>

<!-- Wordmarks -->
<div style="text-align:center; margin-top:30px;"><p class="sub">wordmarks</p></div>

<div class="row">
    <!-- #6 minimal brain + wave -->
    <div class="dark wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 58 15 Q 82 10 96 24 Q 110 40 104 58 Q 98 72 85 80 Q 72 88 58 88 Q 44 88 32 80 Q 18 72 14 58 Q 8 40 22 24 Q 36 10 58 15 Z" stroke="url(#w6)" stroke-width="4.5" fill="none" stroke-linejoin="round"/>
            <path d="M 25 50 C 38 25 52 75 65 50 C 78 25 92 50 100 50" stroke="#10b981" stroke-width="4.5" stroke-linecap="round" fill="none"/>
            <defs><linearGradient id="w6" x1="8" y1="15" x2="110" y2="88"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>

    <!-- #7 crossing waves + dot -->
    <div class="dark wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 50 88 Q 30 85 20 72 Q 10 58 12 42 Q 14 26 28 16 Q 42 8 58 10 Q 74 12 86 18 Q 100 26 106 42 Q 110 55 104 65 Q 98 75 88 78 Q 82 80 78 84 Q 74 88 68 90 Q 58 92 50 88 Z" stroke="url(#w7)" stroke-width="4" fill="none" stroke-linejoin="round"/>
            <path d="M 20 48 Q 40 30 60 48 Q 80 66 100 48" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <path d="M 20 55 Q 40 73 60 55 Q 80 37 100 55" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <circle cx="60" cy="51" r="5" fill="#06b6d4"/>
            <defs><linearGradient id="w7" x1="10" y1="10" x2="110" y2="90"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>

    <!-- #2 double wave -->
    <div class="dark wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 60 12 Q 85 8 98 22 Q 112 38 105 55 Q 100 68 88 75 Q 78 82 65 85 L 55 85 Q 42 82 32 75 Q 20 68 15 55 Q 8 38 22 22 Q 35 8 60 12 Z" stroke="url(#w2)" stroke-width="4" fill="none" stroke-linejoin="round"/>
            <path d="M 22 45 Q 40 30 60 45 Q 80 60 100 45" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <path d="M 22 55 Q 32 45 40 55 Q 48 65 56 55 Q 64 45 72 55 Q 80 65 88 55 Q 96 45 100 55" stroke="#10b981" stroke-width="3" stroke-linecap="round" fill="none"/>
            <defs><linearGradient id="w2" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#6366f1"/><stop offset="0.5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>
</div>

<!-- Light backgrounds -->
<div class="row">
    <div class="light wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 58 15 Q 82 10 96 24 Q 110 40 104 58 Q 98 72 85 80 Q 72 88 58 88 Q 44 88 32 80 Q 18 72 14 58 Q 8 40 22 24 Q 36 10 58 15 Z" stroke="url(#wl6)" stroke-width="4.5" fill="none" stroke-linejoin="round"/>
            <path d="M 25 50 C 38 25 52 75 65 50 C 78 25 92 50 100 50" stroke="#059669" stroke-width="4.5" stroke-linecap="round" fill="none"/>
            <defs><linearGradient id="wl6" x1="8" y1="15" x2="110" y2="88"><stop stop-color="#4f46e5"/><stop offset="1" stop-color="#0891b2"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>

    <div class="light wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 50 88 Q 30 85 20 72 Q 10 58 12 42 Q 14 26 28 16 Q 42 8 58 10 Q 74 12 86 18 Q 100 26 106 42 Q 110 55 104 65 Q 98 75 88 78 Q 82 80 78 84 Q 74 88 68 90 Q 58 92 50 88 Z" stroke="url(#wl7)" stroke-width="4" fill="none" stroke-linejoin="round"/>
            <path d="M 20 48 Q 40 30 60 48 Q 80 66 100 48" stroke="#4f46e5" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <path d="M 20 55 Q 40 73 60 55 Q 80 37 100 55" stroke="#059669" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <circle cx="60" cy="51" r="5" fill="#0891b2"/>
            <defs><linearGradient id="wl7" x1="10" y1="10" x2="110" y2="90"><stop stop-color="#4f46e5"/><stop offset="0.5" stop-color="#0891b2"/><stop offset="1" stop-color="#059669"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>

    <div class="light wm">
        <svg width="38" height="32" viewBox="0 0 120 100" fill="none">
            <path d="M 60 12 Q 85 8 98 22 Q 112 38 105 55 Q 100 68 88 75 Q 78 82 65 85 L 55 85 Q 42 82 32 75 Q 20 68 15 55 Q 8 38 22 22 Q 35 8 60 12 Z" stroke="url(#wl2)" stroke-width="4" fill="none" stroke-linejoin="round"/>
            <path d="M 22 45 Q 40 30 60 45 Q 80 60 100 45" stroke="#4f46e5" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <path d="M 22 55 Q 32 45 40 55 Q 48 65 56 55 Q 64 45 72 55 Q 80 65 88 55 Q 96 45 100 55" stroke="#059669" stroke-width="3" stroke-linecap="round" fill="none"/>
            <defs><linearGradient id="wl2" x1="10" y1="20" x2="110" y2="80"><stop stop-color="#4f46e5"/><stop offset="0.5" stop-color="#0891b2"/><stop offset="1" stop-color="#059669"/></linearGradient></defs>
        </svg>
        <span>MyReson</span>
    </div>
</div>

</body>
</html>
